name: Feature request
description: Propose a target, option, or compatibility improvement
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What user-facing Standard JSON Schema behavior should change?
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Desired contract
      description: Describe the expected input, output, and target behavior.
      render: ts
    validations:
      required: true
